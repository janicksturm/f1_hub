<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Hub - Forum</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-900 font-sans antialiased">
    <!-- Navigation (Same as index.html for now - should be a component in a real app) -->
    <nav class="bg-red-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex-shrink-0">
                    <a href="/" class="flex items-center">
                        <span class="font-bold text-2xl tracking-tighter italic">F1 HUB</span>
                    </a>
                </div>
                <!-- Desktop Menu -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="/"
                            class="hover:bg-red-500 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition duration-150 ease-in-out">Home</a>
                        <a href="/forum"
                            class="bg-red-700 text-white px-3 py-2 rounded-md text-sm font-medium">Forum</a>
                        {% if user_id %}
                        <a href="/dashboard"
                            class="hover:bg-red-500 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition duration-150 ease-in-out">Dashboard</a>
                        <a href="/logout"
                            class="bg-white text-red-600 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition duration-150 ease-in-out">Logout</a>
                        {% else %}
                        <a href="/login"
                            class="hover:bg-red-500 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition duration-150 ease-in-out">Login</a>
                        <a href="/register"
                            class="bg-white text-red-600 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition duration-150 ease-in-out">Register</a>
                        {% endif %}
                    </div>
                </div>
                <!-- Mobile menu button -->
                <div class="-mr-2 flex md:hidden">
                    <button type="button"
                        class="inline-flex items-center justify-center p-2 rounded-md text-red-200 hover:text-white hover:bg-red-500 focus:outline-none focus:bg-red-500 focus:text-white transition duration-150 ease-in-out">
                        <svg class="h-6 w-6" stroke="currentColor" fill="none" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <div class="px-4 py-6 sm:px-0">
            <div class="bg-white shadow overflow-hidden sm:rounded-md">
                <div class="px-4 py-5 border-b border-gray-200 sm:px-6 flex justify-between items-center">
                    <h3 class="text-lg leading-6 font-medium text-gray-900">
                        Discussion Forum
                    </h3>
                    <button id="new-thread-btn"
                        class="bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-150 ease-in-out">
                        New Thread
                    </button>
                </div>
                <ul id="threads">
                    <!-- Threads injected by JS -->
                </ul>
            </div>
        </div>
    </div>

    <!-- New Thread Modal (Hidden by default) -->
    <div id="new-thread" class="hidden fixed z-10 inset-0 overflow-y-auto" aria-labelledby="modal-title"
        aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">

            <!-- Modal panel -->
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true"></span>
            <div
                class="inline-block align-bottom bg-white rounded-lg px-4 pt-5 pb-4 text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6">
                <div>
                    <div class="mt-3 text-center sm:mt-5 sm:text-left">
                        <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">
                            Create New Thread
                        </h3>
                        <div class="mt-2">
                            <form id="new-thread-form" method="POST" action="/api/threads/create">
                                <div class="mb-4">
                                    <label for="thread-title"
                                        class="block text-sm font-medium text-gray-700">Title</label>
                                    <input type="text" name="title" id="thread-title"
                                        class="mt-1 focus:ring-red-500 focus:border-red-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md border p-2"
                                        placeholder="What do you want to discuss?" required>
                                </div>
                                <div class="mb-4">
                                    <label for="thread-content" class="block text-sm font-medium text-gray-700">Message
                                        (Optional)</label>
                                    <textarea id="thread-content" name="content" rows="3"
                                        class="mt-1 shadow-sm focus:ring-red-500 focus:border-red-500 block w-full sm:text-sm border border-gray-300 rounded-md p-2"
                                        placeholder="Add some details..."></textarea>
                                </div>

                                <button type="submit" id="submit-thread-btn"
                                    class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 sm:col-start-2 sm:text-sm">
                                    Create Post
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="flex justify-center mt-2">
                    <button type="button" id="cancel-thread-btn"
                        class="w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 sm:mt-0 sm:col-start-1 sm:text-sm">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/public/js/listThreads.js"></script>
</body>

</html>
