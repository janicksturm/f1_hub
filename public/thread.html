<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Hub - Thread</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-900 font-sans antialiased">
    <!-- Navigation -->
    <nav class="bg-red-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex-shrink-0">
                    <a href="/" class="flex items-center">
                        <span class="font-bold text-2xl tracking-tighter italic">F1 HUB</span>
                    </a>
                </div>
                <!-- Desktop Menu -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="/"
                            class="hover:bg-red-500 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition duration-150 ease-in-out">Home</a>
                        <a href="/forum"
                            class="hover:bg-red-500 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition duration-150 ease-in-out">Forum</a>
                        {% if user_id %}
                        <a href="/dashboard"
                            class="hover:bg-red-500 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition duration-150 ease-in-out">Dashboard</a>
                        <a href="/logout"
                            class="bg-white text-red-600 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition duration-150 ease-in-out">Logout</a>
                        {% else %}
                        <a href="/login"
                            class="hover:bg-red-500 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition duration-150 ease-in-out">Login</a>
                        <a href="/register"
                            class="bg-white text-red-600 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition duration-150 ease-in-out">Register</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <!-- Thread Header -->
        <div class="mb-4">
            <a href="/forum" class="text-red-600 hover:text-red-800 font-medium inline-flex items-center">
                <svg class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Forum
            </a>
        </div>

        <!-- Main Thread Container -->
        <div class="bg-white shadow overflow-hidden sm:rounded-md mb-6">
            <div class="px-4 py-5 border-b border-gray-200 sm:px-6 flex justify-between items-center bg-gray-50">
                <h3 id="thread-title-display" class="text-xl leading-6 font-bold text-gray-900">
                    Loading Thread...
                </h3>
                <div class="text-sm text-gray-500" id="thread-meta"></div>
            </div>
            <div class="px-4 py-5 sm:p-6 text-gray-700 whitespace-pre-wrap" id="thread-content-display"></div>
        </div>

        <!-- Comments Section -->
        <div class="bg-white shadow overflow-hidden sm:rounded-md mb-6">
            <div class="px-4 py-4 border-b border-gray-200 bg-gray-50 sm:px-6 flex items-center justify-between">
                <h4 class="text-lg font-medium text-gray-900">Comments</h4>
                <span id="comment-count"
                    class="px-2 py-1 bg-red-100 text-red-800 text-xs font-semibold rounded-full">0</span>
            </div>
            <ul id="comments-list" class="divide-y divide-gray-200">
                <!-- Comments injected by JS -->
            </ul>
        </div>

        <!-- Create Comment Form -->
        {% if user_id %}
        <div class="bg-white shadow sm:rounded-lg">
            <div class="px-4 py-5 sm:p-6">
                <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4">Add a Reply</h3>
                <form id="new-comment-form" method="POST" action="/api/threads/{{ thread_id }}/comments/create">
                    <div class="mb-4">
                        <label for="comment-content" class="sr-only">Comment</label>
                        <textarea id="comment-content" name="content" rows="4" required
                            class="shadow-sm focus:ring-red-500 focus:border-red-500 block w-full sm:text-sm border border-gray-300 rounded-md p-3"
                            placeholder="What are your thoughts?"></textarea>
                    </div>
                    <div class="flex justify-end">
                        <button type="submit"
                            class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                            Post Reply
                        </button>
                    </div>
                </form>
            </div>
        </div>
        {% else %}
        <div class="text-center py-6 bg-white shadow rounded-md border text-gray-600">
            <p class="mb-2">Want to join the discussion?</p>
            <a href="/login" class="text-red-600 font-bold hover:underline">Log in</a> or <a href="/register"
                class="text-red-600 font-bold hover:underline">Register</a>
        </div>
        {% endif %}
    </div>
    <script src="/public/js/threadsComments.js"></script>
</body>

</html>
